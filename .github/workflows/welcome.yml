name: Welcome

on:
    pull_request_target:
        types: [opened]
    issues:
        types: [opened]

permissions:
    issues: write
    pull-requests: write

jobs:
    welcome:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/first-interaction@v1
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  issue-message: |
                      👋 Welcome to DockAdmin, @${{ github.actor }}! Thanks for opening your first issue.

                      We appreciate you taking the time to report this. A maintainer will review it soon.

                      In the meantime, please make sure you've:
                      - Searched for existing issues to avoid duplicates
                      - Provided clear steps to reproduce (for bugs)
                      - Included environment details (OS, browser, DB type)

                      Happy to have you here! 🎉
                  pr-message: |
                      🎉 Welcome to DockAdmin, @${{ github.actor }}! Thanks for your first pull request!

                      We're excited to review your contribution. Here's what happens next:
                      - A maintainer will review your PR
                      - We may request some changes or ask questions
                      - Once approved, we'll merge it in!

                      Thank you for helping make DockAdmin better! 🚀
