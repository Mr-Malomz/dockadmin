name: Build and Push Docker Image

on:
    push:
        tags:
            - 'v*' # Trigger on version tags like v0.1.0, v1.0.0
    workflow_dispatch: # Allow manual trigger

env:
    REGISTRY: docker.io
    IMAGE_NAME: demlabz/dockadmin

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # Set up QEMU for multi-platform builds
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            # Set up Docker Buildx for advanced build features
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Login to Docker Hub
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # Extract metadata for tags and labels
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      # Tag with version (v1.0.0 -> 1.0.0)
                      type=semver,pattern={{version}}
                      # Tag with major.minor (v1.0.0 -> 1.0)
                      type=semver,pattern={{major}}.{{minor}}
                      # Tag with major only (v1.0.0 -> 1)
                      type=semver,pattern={{major}}
                      # Always tag latest on version tags
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
                      # Tag with SHA for traceability
                      type=sha,prefix=

            # Build and push multi-platform image
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Update Docker Hub description (optional)
            - name: Update Docker Hub description
              uses: peter-evans/dockerhub-description@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
                  repository: ${{ env.IMAGE_NAME }}
                  readme-filepath: ./README.md
